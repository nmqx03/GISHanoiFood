spring.application.name=hanoifood
spring.datasource.url=jdbc:postgresql://localhost:5432/webgis_amthuc
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Static resources: only classpath:/static/
# Uploaded files (images) are served via WebConfig: /uploads/** -> file:uploads/
spring.web.resources.static-locations=classpath:/static/

spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.enabled=true
spring.thymeleaf.cache=false

gemini.api.key="K push key lên git"
