<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đăng nhập - WebGIS Ẩm Thực Hà Nội</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
	rel="stylesheet">

<style>
body, html {
	height: 100%;
	font-family: 'Inter', sans-serif;
	overflow: hidden;
}

.login-section {
	background-color: #ffffff;
	height: 100vh;
	display: flex;
	flex-direction: column;
	justify-content: center;
	padding: 0 10%;
}

.banner-section {

	background-image:
		url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?q=80&w=1920&auto=format&fit=crop');
	background-size: cover;
	background-position: center;
	height: 100vh;
	position: relative;
}

.banner-overlay {
	position: absolute;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	background: rgba(0, 0, 0, 0.3);
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	color: white;
	text-align: center;
}

.form-control {
	background-color: #f3f6f9;
	border: 1px solid #e1e3ea;
	height: 50px;
	border-radius: 8px;
}

.form-control:focus {
	background-color: #fff;
	border-color: #198754;
	box-shadow: none; 
}

.btn-login {
	background-color: #198754;
	border: none;
	height: 50px;
	border-radius: 8px;
	font-size: 16px;
	font-weight: 600;
}

.btn-login:hover {
	background-color: #146c43;
}

@media ( max-width : 768px) {
	.banner-section {
		display: none;
	}
	.login-section {
		padding: 30px;
	}
}
</style>
</head>
<body>

	<div class="container-fluid h-100 p-0">
		<div class="row g-0 h-100">

			<div class="col-md-6 col-lg-5 login-section">
				<div class="mb-5">
					<h2 class="fw-bold text-dark">Đăng nhập</h2>
					<p class="text-secondary">Nhập email và mật khẩu.</p>
				</div>

				<div id="alert-box"></div>

				<form id="loginForm">
					<div class="mb-3">
						<label
							class="form-label fw-medium small text-uppercase text-secondary">Email</label>
						<input type="email" id="email" class="form-control"
							placeholder="abc@gmail.com" required>
					</div>

					<div class="mb-4">
						<div class="d-flex justify-content-between">
							<label
								class="form-label fw-medium small text-uppercase text-secondary">Mật
								khẩu</label>
						</div>
						<input type="password" id="password" class="form-control"
							placeholder="••••••••" required>
					</div>

					<button class="btn btn-primary btn-login w-100" type="submit"
						id="btn-login">Đăng nhập</button>
				</form>
				<p class="mt-4 text-center text-secondary small">
					Chưa có tài khoản <a href="register"
						class="text-success text-decoration-none fw-bold">Đăng ký ngay</a>
				</p>
			</div>

			<div class="col-md-6 col-lg-7 banner-section">
				<div class="banner-overlay">
					<h1 class="display-4 fw-bold mb-3">Ẩm Thực Hà Nội</h1>
					<p class="lead px-5">Khám phá ẩm thực ngàn năm văn hiến!</p>
				</div>
			</div>

		</div>
	</div>

	<script>
    const API_URL = "/api/auth/login";
    const loginForm = document.getElementById('loginForm');
    const alertBox = document.getElementById('alert-box');
    const btnLogin = document.getElementById('btn-login');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const originalText = btnLogin.innerHTML;
      btnLogin.innerHTML = 'Đang xử lý...';
      btnLogin.disabled = true;

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      alertBox.innerHTML = '';

      try {
          const res = await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, password })
          });

          const data = await res.json();

          if (!res.ok) {
            alertBox.innerHTML = `<div class="alert alert-danger py-2 small">${data.error || 'Thông tin đăng nhập không đúng'}</div>`;
            return;
          }

          const userToSave = {
              id: data.id,          
              token: data.token,
              email: data.email,
              fullName: data.fullName,
              role: data.role,
              avatarUrl: data.avatarUrl
          };

          localStorage.setItem('currentUser', JSON.stringify(userToSave));
          localStorage.setItem('token', data.token);
          window.location.href = '/'; 

      } catch (error) {
          console.error("Lỗi:", error);
          alertBox.innerHTML = `<div class="alert alert-danger py-2 small">Lỗi kết nối máy chủ!</div>`;
      } finally {
        if (alertBox.innerHTML !== '') {
            btnLogin.innerHTML = originalText;
            btnLogin.disabled = false;
        }
      }
    });
</script>

</body>
</html>
