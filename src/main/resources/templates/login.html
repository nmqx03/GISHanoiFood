<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="fragment/header :: head">
    <title>Đăng nhập - HanoiFood</title>
</head>
<body class="bg-light">

<div th:replace="fragment/header :: navbar"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="fas fa-utensils fa-3x text-danger mb-2"></i>
                        <h4 class="fw-bold">Đăng nhập</h4>
                        <p class="text-muted small">Khám phá ẩm thực Hà Nội cùng HanoiFood</p>
                    </div>

                    <div id="errorMsg" class="alert alert-danger d-none"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope text-danger"></i></span>
                                <input type="email" class="form-control" id="email"
                                       placeholder="example@email.com" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock text-danger"></i></span>
                                <input type="password" class="form-control" id="password"
                                       placeholder="Nhập mật khẩu" required>
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword()">
                                    <i class="fas fa-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-danger btn-lg">
                                <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
                            </button>
                        </div>
                    </form>

                    <hr>
                    <div class="text-center">
                        <p class="mb-0">Chưa có tài khoản?
                            <a href="/register" class="text-danger fw-bold">Đăng ký ngay</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="fragment/header :: auth-script"></script>
<script>
    // Nếu đã đăng nhập thì chuyển về trang chủ
    if (localStorage.getItem('token')) {
        window.location.href = '/';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (!res.ok) {
                const err = await res.text();
                showError('Email hoặc mật khẩu không đúng');
                return;
            }

            const data = await res.json();
            localStorage.setItem('token', data.token);
            localStorage.setItem('userName', data.fullName || data.email);
            localStorage.setItem('userRole', data.role);

            // Admin thì vào trang quản trị
            if (data.role === 'ADMIN') {
                window.location.href = '/admin';
            } else {
                window.location.href = '/';
            }
        } catch (err) {
            showError('Lỗi kết nối server');
        }
    });

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.remove('d-none');
    }

    function togglePassword() {
        const pwd  = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (pwd.type === 'password') {
            pwd.type  = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            pwd.type  = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
</body>
</html>
