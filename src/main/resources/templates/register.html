<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng ký - WebGIS Ẩm Thực Hà Nội</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body, html {
      height: 100%;
      font-family: 'Inter', sans-serif;
      overflow: hidden; 
    }

    /* Phần bên trái: Form */
    .register-section {
      background-color: #ffffff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 10%; 
    }

    /* Phần bên phải: Ảnh nền HD Hà Nội */
    .banner-section {
      background-image: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?q=80&w=1920&auto=format&fit=crop'); /* Ảnh Tam Cốc chất lượng cao */
      background-size: cover;
      background-position: center;
      height: 100vh;
      position: relative;
    }
    
    .banner-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.2); /* Lớp phủ mờ giúp ảnh sâu hơn */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .form-control {
      background-color: #f3f6f9;
      border: 1px solid #e1e3ea;
      height: 45px; 
      border-radius: 8px;
    }

    .form-control:focus {
      background-color: #fff;
      border-color: #198754;
      box-shadow: none;
    }

    .btn-register {
      background-color: #198754;
      border: none;
      height: 50px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
    }

    .btn-register:hover {
      background-color: #146c43;
    }

    @media (max-width: 768px) {
      .banner-section { display: none; }
      .register-section { padding: 30px; }
    }
  </style>
</head>
<body>

<div class="container-fluid h-100 p-0">
  <div class="row g-0 h-100">
    
    <div class="col-md-6 col-lg-5 register-section">
      <div class="mb-4">
        <h2 class="fw-bold text-dark">Tạo tài khoản</h2>
        <p class="text-secondary">Khám phá ẩm thực Hà Nội cùng chúng tôi</p>
      </div>

      <div id="alert-box"></div>

      <form id="registerForm">
        <div class="mb-3">
          <label class="form-label fw-medium small text-uppercase text-secondary">Họ và tên</label>
          <input type="text" id="fullName" class="form-control" placeholder="Nguyễn Văn A" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-medium small text-uppercase text-secondary">Email</label>
          <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
        </div>

        <div class="mb-4">
          <label class="form-label fw-medium small text-uppercase text-secondary">Mật khẩu</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button class="btn btn-primary btn-register w-100 text-white" type="submit" id="btn-register">Đăng ký ngay</button>
      </form>

      <p class="mt-4 text-center text-secondary small">
        Đã có tài khoản? <a href="login" class="text-success text-decoration-none fw-bold">Đăng nhập</a>
      </p>
    </div>

    <div class="col-md-6 col-lg-7 banner-section">
      <div class="banner-overlay">
        <h1 class="display-4 fw-bold mb-3" style="text-shadow: 2px 2px 10px rgba(0,0,0,0.3);">Ẩm Thực Hà Nội</h1>
        <p class="lead px-5">Hương vị ngàn năm văn hiến!</p>
      </div>
    </div>

  </div>
</div>

<script>
    const API_URL = "/api/auth/register";
    const registerForm = document.getElementById('registerForm');
    const alertBox = document.getElementById('alert-box');
    const btnRegister = document.getElementById('btn-register');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const originalText = btnRegister.innerHTML;
      btnRegister.innerHTML = 'Đang xử lý...';
      btnRegister.disabled = true;

      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      alertBox.innerHTML = '';

      try {
          const res = await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ fullName, email, password })
          });

          const data = await res.json();

          if (!res.ok) {
            alertBox.innerHTML = `<div class="alert alert-danger py-2 small">${data.error || 'Đăng ký thất bại, vui lòng thử lại'}</div>`;
            return;
          }

          // Lưu thông tin sau khi đăng ký thành công
          localStorage.setItem('currentUser', JSON.stringify(data));
          localStorage.setItem('token', data.token);

          alertBox.innerHTML = `<div class="alert alert-success py-2 small">Đăng ký thành công! Đang chuyển hướng...</div>`;
          setTimeout(() => window.location.href = '/', 1500);

      } catch (error) {
          console.error("Lỗi:", error);
          alertBox.innerHTML = `<div class="alert alert-danger py-2 small">Lỗi kết nối máy chủ!</div>`;
      } finally {
        if (!alertBox.innerHTML.includes('thành công')) {
            btnRegister.innerHTML = originalText;
            btnRegister.disabled = false;
        }
      }
    });
</script>

</body>
</html>
