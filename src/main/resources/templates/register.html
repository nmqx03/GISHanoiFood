<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="fragment/header :: head">
    <title>Đăng ký - HanoiFood</title>
</head>
<body class="bg-light">

<div th:replace="fragment/header :: navbar"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-plus fa-3x text-danger mb-2"></i>
                        <h4 class="fw-bold">Đăng ký tài khoản</h4>
                        <p class="text-muted small">Tham gia cộng đồng ẩm thực Hà Nội</p>
                    </div>

                    <div id="errorMsg" class="alert alert-danger d-none"></div>
                    <div id="successMsg" class="alert alert-success d-none"></div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user text-danger"></i></span>
                                <input type="text" class="form-control" id="fullName"
                                       placeholder="Nguyễn Văn A" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope text-danger"></i></span>
                                <input type="email" class="form-control" id="email"
                                       placeholder="example@email.com" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock text-danger"></i></span>
                                <input type="password" class="form-control" id="password"
                                       placeholder="Tối thiểu 6 ký tự" required minlength="6">
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('password', 'eye1')">
                                    <i class="fas fa-eye" id="eye1"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Xác nhận mật khẩu</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock text-danger"></i></span>
                                <input type="password" class="form-control" id="confirmPassword"
                                       placeholder="Nhập lại mật khẩu" required>
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('confirmPassword', 'eye2')">
                                    <i class="fas fa-eye" id="eye2"></i>
                                </button>
                            </div>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-danger btn-lg">
                                <i class="fas fa-user-plus me-2"></i>Đăng ký
                            </button>
                        </div>
                    </form>

                    <hr>
                    <div class="text-center">
                        <p class="mb-0">Đã có tài khoản?
                            <a href="/login" class="text-danger fw-bold">Đăng nhập</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="fragment/header :: auth-script"></script>
<script>
    if (localStorage.getItem('token')) {
        window.location.href = '/';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fullName        = document.getElementById('fullName').value;
        const email           = document.getElementById('email').value;
        const password        = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            showError('Mật khẩu xác nhận không khớp');
            return;
        }

        try {
            const res = await fetch('http://localhost:8080/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName, email, password })
            });

            if (!res.ok) {
                const err = await res.text();
                showError(err || 'Email đã tồn tại hoặc lỗi server');
                return;
            }

            const data = await res.json();
            localStorage.setItem('token', data.token);
            localStorage.setItem('userName', data.fullName || data.email);
            localStorage.setItem('userRole', data.role);

            document.getElementById('successMsg').textContent = 'Đăng ký thành công! Đang chuyển hướng...';
            document.getElementById('successMsg').classList.remove('d-none');
            setTimeout(() => window.location.href = '/', 1500);
        } catch (err) {
            showError('Lỗi kết nối server');
        }
    });

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.remove('d-none');
    }

    function togglePassword(fieldId, iconId) {
        const field = document.getElementById(fieldId);
        const icon  = document.getElementById(iconId);
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
</body>
</html>
