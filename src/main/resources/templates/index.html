<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="fragment/header :: head">
    <title>HanoiFood - Khám phá ẩm thực Hà Nội</title>
</head>
<body>

<div th:replace="fragment/header :: navbar"></div>

<div class="container-fluid mt-3">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3">
            <!-- Tìm kiếm -->
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h6 class="card-title"><i class="fas fa-search me-2 text-danger"></i>Tìm kiếm</h6>
                    <div class="input-group">
                        <input type="text" id="searchInput" class="form-control" placeholder="Tên quán, món ăn...">
                        <button class="btn btn-danger" onclick="searchPlaces()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Danh mục -->
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h6 class="card-title"><i class="fas fa-tags me-2 text-danger"></i>Danh mục</h6>
                    <div id="categoryList" class="d-flex flex-wrap gap-2"></div>
                </div>
            </div>

            <!-- Chức năng GIS -->
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h6 class="card-title"><i class="fas fa-map-marked-alt me-2 text-danger"></i>Phân tích GIS</h6>
                    <div class="mb-2">
                        <label class="form-label small">Bán kính tìm kiếm (km)</label>
                        <input type="range" class="form-range" id="radiusSlider" min="0.5" max="10" step="0.5" value="2"
                               oninput="document.getElementById('radiusValue').textContent = this.value">
                        <small class="text-muted">Bán kính: <span id="radiusValue">2</span> km</small>
                    </div>
                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-danger btn-sm" onclick="findNearby()">
                            <i class="fas fa-location-arrow me-1"></i>Tìm lân cận
                        </button>
                        <button class="btn btn-outline-warning btn-sm" onclick="showBuffer()">
                            <i class="fas fa-circle me-1"></i>Vùng Buffer
                        </button>
                        <button class="btn btn-outline-info btn-sm" onclick="toggleHeatmap()">
                            <i class="fas fa-fire me-1"></i>Heatmap
                        </button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="clearLayers()">
                            <i class="fas fa-times me-1"></i>Xóa lớp
                        </button>
                    </div>
                </div>
            </div>

            <!-- Chatbot AI -->
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6 class="card-title"><i class="fas fa-robot me-2 text-danger"></i>Tư vấn AI</h6>
                    <div id="chatMessages" style="height:150px; overflow-y:auto; background:#f8f9fa; border-radius:8px; padding:8px; margin-bottom:8px; font-size:13px;">
                        <div class="text-muted text-center">Hỏi tôi về ẩm thực Hà Nội!</div>
                    </div>
                    <div class="input-group input-group-sm">
                        <input type="text" id="chatInput" class="form-control" placeholder="Hôm nay ăn gì?" onkeypress="if(event.key==='Enter') sendChat()">
                        <button class="btn btn-danger" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bản đồ -->
        <div class="col-md-9">
            <div id="map"></div>
        </div>
    </div>
</div>

<!-- Modal chi tiết quán -->
<div class="modal fade" id="placeModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="placeModalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="placeModalBody"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script th:replace="fragment/header :: auth-script"></script>
<script>
    const API = 'http://localhost:8080/api';
    let map, markersLayer, heatmapLayer, bufferLayer;
    let allPlaces = [];
    let heatmapVisible = false;

    // Khởi tạo bản đồ
    map = L.map('map').setView([21.0285, 105.8542], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    markersLayer = L.layerGroup().addTo(map);
    bufferLayer  = L.layerGroup().addTo(map);

    // Load categories
    async function loadCategories() {
        const res = await fetch(`${API}/categories`);
        const data = await res.json();
        const container = document.getElementById('categoryList');
        container.innerHTML = `<span class="badge bg-danger" style="cursor:pointer" onclick="loadPlaces()">Tất cả</span>`;
        data.forEach(cat => {
            container.innerHTML += `
                <span class="badge bg-light text-dark border" style="cursor:pointer"
                      onclick="filterByCategory(${cat.id})">${cat.name}</span>`;
        });
    }

    // Load tất cả quán
    async function loadPlaces() {
        const res = await fetch(`${API}/places`);
        allPlaces = await res.json();
        showMarkers(allPlaces);
    }

    // Hiển thị markers
    function showMarkers(places) {
        markersLayer.clearLayers();
        places.forEach(place => {
            if (place.latitude && place.longitude) {
                const marker = L.marker([place.latitude, place.longitude])
                    .bindPopup(`
                        <b>${place.name}</b><br>
                        <small>${place.address || ''}</small><br>
                        <a href="#" onclick="showPlaceDetail(${place.id})" class="btn btn-sm btn-danger mt-1">Chi tiết</a>
                    `);
                markersLayer.addLayer(marker);
            }
        });
    }

    // Lọc theo danh mục
    async function filterByCategory(categoryId) {
        const res = await fetch(`${API}/places/category/${categoryId}`);
        const data = await res.json();
        showMarkers(data);
    }

    // Tìm kiếm
    async function searchPlaces() {
        const keyword = document.getElementById('searchInput').value;
        if (!keyword) return;
        const res = await fetch(`${API}/places/search?keyword=${keyword}`);
        const data = await res.json();
        showMarkers(data);
    }

    // Nearby Search
    function findNearby() {
        map.locate({ setView: true, maxZoom: 15 });
        map.once('locationfound', async (e) => {
            const radius = document.getElementById('radiusSlider').value * 1000;
            const res = await fetch(`${API}/places/nearby?lat=${e.latlng.lat}&lng=${e.latlng.lng}&radius=${radius}`);
            const data = await res.json();
            showMarkers(data);
            L.circle(e.latlng, { radius, color: '#e74c3c', fillOpacity: 0.1 }).addTo(bufferLayer);
        });
    }

    // Buffer Zone
    function showBuffer() {
        map.locate();
        map.once('locationfound', async (e) => {
            const radius = document.getElementById('radiusSlider').value * 1000;
            bufferLayer.clearLayers();
            L.circle(e.latlng, {
                radius, color: '#f39c12', fillColor: '#f39c12', fillOpacity: 0.15, weight: 2
            }).addTo(bufferLayer);
            const res = await fetch(`${API}/places/buffer?lat=${e.latlng.lat}&lng=${e.latlng.lng}&radius=${radius}`);
            const data = await res.json();
            showMarkers(data);
        });
    }

    // Heatmap
    async function toggleHeatmap() {
        if (heatmapVisible && heatmapLayer) {
            map.removeLayer(heatmapLayer);
            heatmapVisible = false;
            return;
        }
        const res = await fetch(`${API}/places/heatmap`);
        const data = await res.json();
        const points = data
            .filter(p => p.latitude && p.longitude)
            .map(p => [p.latitude, p.longitude, p.viewCount || 1]);
        heatmapLayer = L.heatLayer(points, { radius: 30, blur: 20, maxZoom: 17 }).addTo(map);
        heatmapVisible = true;
    }

    // Xóa lớp
    function clearLayers() {
        bufferLayer.clearLayers();
        if (heatmapLayer) map.removeLayer(heatmapLayer);
        heatmapVisible = false;
        loadPlaces();
    }

    // Chi tiết quán
    async function showPlaceDetail(id) {
        const res = await fetch(`${API}/places/${id}`);
        const place = await res.json();
        document.getElementById('placeModalTitle').textContent = place.name;
        document.getElementById('placeModalBody').innerHTML = `
            <div class="row">
                <div class="col-md-5">
                    <img src="${place.imageUrl || 'https://via.placeholder.com/300x200'}"
                         class="img-fluid rounded" alt="${place.name}">
                </div>
                <div class="col-md-7">
                    <p><i class="fas fa-map-marker-alt text-danger me-2"></i>${place.address || 'Chưa có địa chỉ'}</p>
                    <p><i class="fas fa-phone text-success me-2"></i>${place.phone || 'Chưa có SĐT'}</p>
                    <p><i class="fas fa-money-bill text-warning me-2"></i>${place.priceRange || 'Chưa có giá'}</p>
                    <p>${place.description || ''}</p>
                    <button class="btn btn-danger btn-sm" onclick="addFavorite(${place.id})">
                        <i class="fas fa-heart me-1"></i>Yêu thích
                    </button>
                </div>
            </div>`;
        new bootstrap.Modal(document.getElementById('placeModal')).show();
        // Tăng lượt xem
        fetch(`${API}/stats/places/${id}/view`, { method: 'PUT' });
    }

    // Thêm yêu thích
    async function addFavorite(placeId) {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login'; return; }
        await fetch(`${API}/favorites/${placeId}`, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        alert('Đã thêm vào yêu thích!');
    }

    // Chat AI
    async function sendChat() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message) return;

        const chatMessages = document.getElementById('chatMessages');
        chatMessages.innerHTML += `<div class="text-end mb-1"><span class="badge bg-danger">${message}</span></div>`;
        input.value = '';

        const token = localStorage.getItem('token');
        if (!token) {
            chatMessages.innerHTML += `<div class="text-start mb-1"><span class="badge bg-secondary">Vui lòng đăng nhập để dùng AI</span></div>`;
            return;
        }

        const res = await fetch(`${API}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ message })
        });
        const data = await res.json();
        chatMessages.innerHTML += `<div class="text-start mb-1"><span class="badge bg-light text-dark border">${data.reply}</span></div>`;
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Khởi động
    loadCategories();
    loadPlaces();
</script>
</body>
</html>
